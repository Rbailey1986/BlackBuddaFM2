<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROTOTYPE 3: STENCIL STREET ART TUNER</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #0b0c10;
      color: #e2e8f0;
      font-family: 'Space Mono', monospace;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      justify-content: center;
    }

    h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 26px;
      margin-bottom: 32px;
      text-transform: uppercase;
      color: #a1fb00;
      text-shadow: 0 0 8px rgba(161, 251, 0, 0.4);
    }

    /* Stencil Container */
    .tuner-section {
      background: #141722;
      border: 6px solid #2d3748;
      border-radius: 4px;
      padding: 40px;
      width: 100%;
      max-width: 800px;
      position: relative;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
      background-image: 
        radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0),
        radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
      background-size: 16px 16px;
      background-position: 0 0, 8px 8px;
    }

    /* Paint splatters */
    .tuner-section::before {
      content: '';
      position: absolute;
      top: 15px;
      left: 20px;
      width: 30px;
      height: 30px;
      background: rgba(161, 251, 0, 0.15);
      border-radius: 50%;
      filter: blur(4px);
    }

    .tuner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px dashed #2d3748;
      padding-bottom: 12px;
    }

    .tuner-label {
      font-size: 16px;
      font-weight: 700;
      color: #a1fb00;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .tuner-strength {
      font-size: 10px;
      color: #718096;
    }

    /* Display */
    .tuner-display {
      position: relative;
      width: 100%;
      height: 110px;
      background: #090a0f;
      border: 2px solid #2d3748;
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      overflow: hidden;
      cursor: ew-resize;
      user-select: none;
    }

    .tuner-needle {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 8px;
      background: linear-gradient(to bottom, #a1fb00, #39FF14);
      box-shadow: 0 0 10px rgba(161, 251, 0, 0.5);
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    .tuner-stations-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tuner-station-mark {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #4a5568;
      font-weight: 700;
      transition: all 0.2s;
      cursor: pointer;
      pointer-events: auto;
    }

    .tuner-station-mark .freq-num {
      font-size: 22px;
      letter-spacing: -0.5px;
    }

    .tuner-station-mark .genre-name {
      font-size: 8px;
      text-transform: uppercase;
      color: #4a5568;
      letter-spacing: 1px;
    }

    .tuner-station-mark.active {
      color: #a1fb00;
      text-shadow: 0 0 8px rgba(161, 251, 0, 0.6);
      transform: translate(-50%, -50%) scale(1.15);
    }

    .tuner-station-mark.active .genre-name {
      color: #e2e8f0;
    }

    /* Controls */
    .tuner-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ctrl-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctrl-key {
      font-size: 11px;
      font-weight: 700;
      color: #718096;
      letter-spacing: 1px;
    }

    .btn-group {
      display: flex;
      background: #090a0f;
      border: 1.5px solid #2d3748;
      padding: 2px;
      border-radius: 2px;
    }

    .btn-tab {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      padding: 6px 16px;
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-tab.active-green, .btn-tab.active-pink {
      background: #2d3748;
      color: #a1fb00;
    }

    .gain-knob {
      width: 44px;
      height: 44px;
      background: #090a0f;
      border: 2px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ns-resize;
    }

    .knob-line {
      width: 2px;
      height: 18px;
      background: #a1fb00;
    }

    .back-btn {
      margin-top: 40px;
      font-family: 'Permanent Marker', cursive;
      font-size: 14px;
      color: #a1fb00;
      text-decoration: none;
      border: 2px solid #a1fb00;
      padding: 10px 24px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #a1fb00;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>PROTOTYPE 3: STENCIL STREET ART</h1>

  <div class="tuner-section">
    <div class="tuner-header">
      <span class="tuner-label">TUNING THE UNDERGROUND</span>
      <span class="tuner-strength" id="tuner-strength">STRENGTH: 98%</span>
    </div>

    <div class="tuner-display" id="tuner-display">
      <div class="tuner-needle" id="tuner-needle"></div>
      <div class="tuner-stations-container" id="tuner-stations-container"></div>
    </div>

    <div class="tuner-controls">
      <div class="ctrl-item">
        <span class="ctrl-key">BAND</span>
        <div class="btn-group">
          <button class="btn-tab active-green">FM</button>
          <button class="btn-tab">AM</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">MODE</span>
        <div class="btn-group">
          <button class="btn-tab active-pink">STEREO</button>
          <button class="btn-tab">MONO</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">GAIN</span>
        <div class="gain-knob" id="gain-knob">
          <div class="knob-line" id="knob-line"></div>
        </div>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-btn">← BACK TO BROADCAST DECK</a>

  <script src="stations-data.js"></script>
  <script>
    const MIN_FREQ = 88.9;
    const MAX_FREQ = 109.8;
    let currentFreq = 89.9; // Jungle
    let isDragging = false;

    function freqToPercent(freq) {
      const ratio = (freq - MIN_FREQ) / (MAX_FREQ - MIN_FREQ);
      return 5 + ratio * 90;
    }

    function percentToFreq(pct) {
      const ratio = Math.max(0, Math.min(1, (pct - 5) / 90));
      return MIN_FREQ + ratio * (MAX_FREQ - MIN_FREQ);
    }

    function setupTuner() {
      const mount = document.getElementById('tuner-stations-container');
      STATIONS.forEach(st => {
        const mark = document.createElement('div');
        mark.className = 'tuner-station-mark';
        mark.style.left = freqToPercent(st.freq) + '%';
        mark.setAttribute('data-freq', st.freq);
        mark.innerHTML = `<span class="freq-num">${st.freq.toFixed(1)}</span><span class="genre-name">${st.genre}</span>`;
        mark.addEventListener('click', () => {
          animateNeedle(st.freq);
        });
        mount.appendChild(mark);
      });
      updateTunerPosition();
    }

    function updateTunerPosition() {
      const needle = document.getElementById('tuner-needle');
      needle.style.left = freqToPercent(currentFreq) + '%';

      let nearest = null;
      let minDiff = Infinity;
      STATIONS.forEach(st => {
        const d = Math.abs(currentFreq - st.freq);
        if (d < minDiff) { minDiff = d; nearest = st; }
      });

      document.querySelectorAll('.tuner-station-mark').forEach(m => {
        const f = parseFloat(m.getAttribute('data-freq'));
        if (nearest && nearest.freq === f && minDiff < 0.25) {
          m.classList.add('active');
          document.getElementById('tuner-strength').textContent = `STRENGTH: ${Math.round((1 - minDiff / 0.25) * 20 + 80)}%`;
        } else {
          m.classList.remove('active');
        }
      });

      if (minDiff >= 0.25) {
        document.getElementById('tuner-strength').textContent = 'STRENGTH: 0% (DRIFT)';
      }
    }

    function animateNeedle(target) {
      const step = () => {
        const diff = target - currentFreq;
        if (Math.abs(diff) < 0.05) {
          currentFreq = target;
          updateTunerPosition();
        } else {
          currentFreq += diff * 0.2;
          updateTunerPosition();
          requestAnimationFrame(step);
        }
      };
      step();
    }

    const display = document.getElementById('tuner-display');
    display.addEventListener('mousedown', e => { isDragging = true; handleDrag(e.clientX); });
    window.addEventListener('mousemove', e => { if (isDragging) handleDrag(e.clientX); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    display.addEventListener('touchstart', e => { isDragging = true; handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchmove', e => { if (isDragging) handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchend', () => { isDragging = false; });

    function handleDrag(clientX) {
      const rect = display.getBoundingClientRect();
      const pct = ((clientX - rect.left) / rect.width) * 100;
      currentFreq = Math.round(percentToFreq(pct) * 10) / 10;
      updateTunerPosition();
    }

    setupTuner();
  </script>
</body>
</html>
