<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROTOTYPE TOGETHER: BASQUIAT-WILDSTYLE HYBRID TUNER</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #020204;
      color: #f0f0f5;
      font-family: 'JetBrains Mono', monospace;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 20% 80%, rgba(0, 255, 204, 0.08) 0%, transparent 40%),
        url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
    }

    h1 {
      font-family: 'Rock Salt', cursive;
      font-size: 26px;
      margin-bottom: 32px;
      text-transform: uppercase;
      color: #ff00aa;
      text-shadow: 0 0 15px rgba(255, 0, 170, 0.6);
      text-align: center;
    }

    /* Hybrid Container */
    .tuner-section {
      background: rgba(10, 12, 18, 0.95);
      border: 4px solid #ff00aa;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 850px;
      position: relative;
      box-shadow: 0 0 35px rgba(255, 0, 170, 0.35), 0 0 70px rgba(0, 255, 204, 0.15);
      overflow: visible;
    }

    /* Basquiat Crown SVG (Gold Crown) */
    .crown-icon {
      position: absolute;
      top: -30px;
      left: 30px;
      width: 55px;
      height: 40px;
      fill: none;
      stroke: #ffd700;
      stroke-width: 3.5;
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.8));
      transform: rotate(-12deg);
      z-index: 10;
    }

    /* Wildstyle Arrow Graphic */
    .graffiti-arrow {
      position: absolute;
      bottom: -20px;
      right: -20px;
      width: 110px;
      height: 110px;
      fill: none;
      stroke: #00ffcc;
      stroke-width: 5;
      filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.8));
      transform: rotate(5deg);
      pointer-events: none;
    }

    .tuner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px dashed rgba(255, 0, 170, 0.2);
      padding-bottom: 12px;
    }

    .tuner-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      color: #00ffcc;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
    }

    .tuner-strength {
      font-family: 'Permanent Marker', cursive;
      font-size: 13px;
      color: #ffd700;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
    }

    /* Display */
    .tuner-display {
      position: relative;
      width: 100%;
      height: 150px;
      background: #020204;
      border: 3px solid #ff00aa;
      border-radius: 8px;
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      overflow: hidden;
      cursor: ew-resize;
      user-select: none;
      box-shadow: inset 0 0 25px rgba(0,0,0,0.95);
    }

    /* Chalky background markings */
    .tuner-display::before {
      content: 'SAMO';
      font-family: 'Rock Salt', cursive;
      font-size: 48px;
      color: rgba(255, 255, 255, 0.02);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(-10deg);
      pointer-events: none;
    }

    /* Glowing Spray Needle */
    .tuner-needle {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 6px;
      background: #ff00aa;
      box-shadow: 0 0 20px #ff00aa, 0 0 35px #00ffcc;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    .tuner-needle::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 8px;
      background: #ff00aa;
      border-radius: 4px;
      box-shadow: 0 0 10px #ff00aa;
    }

    .tuner-stations-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tuner-station-mark {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #4a4a5a;
      font-family: 'Permanent Marker', cursive;
      transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      pointer-events: auto;
    }

    .tuner-station-mark .freq-num {
      font-size: 24px;
      letter-spacing: -1px;
    }

    .tuner-station-mark .genre-name {
      font-size: 9px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      color: #666;
      text-decoration: line-through;
      text-decoration-color: #ff00aa;
      letter-spacing: 0.5px;
    }

    .tuner-station-mark.active {
      color: #00ffcc;
      transform: translate(-50%, -50%) scale(1.3) rotate(-3deg);
      text-shadow: 0 0 15px rgba(0, 255, 204, 0.8);
      z-index: 5;
    }

    .tuner-station-mark.active .genre-name {
      text-decoration: none;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
    }

    /* Controls (Sticker Style) */
    .tuner-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .ctrl-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctrl-key {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: #ffd700;
      letter-spacing: 1px;
    }

    /* Sticker Groups */
    .btn-group {
      display: flex;
      background: #000;
      border: 2px solid #ff00aa;
      padding: 3px;
      transform: rotate(-2deg);
      box-shadow: 4px 4px 0px rgba(255, 0, 170, 0.2);
    }

    .btn-tab {
      font-family: 'Permanent Marker', cursive;
      font-size: 11px;
      padding: 6px 18px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-tab.active-pink {
      background: #ff00aa;
      color: #000;
      transform: scale(1.1) rotate(3deg);
      box-shadow: 0 0 8px rgba(255, 0, 170, 0.6);
    }

    .btn-tab.active-green {
      background: #00ffcc;
      color: #000;
      transform: scale(1.1) rotate(-3deg);
      box-shadow: 0 0 8px rgba(0, 255, 204, 0.6);
    }

    .gain-knob {
      width: 48px;
      height: 48px;
      background: #050505;
      border: 3px solid #00ffcc;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ns-resize;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
      transform: rotate(5deg);
    }

    .knob-line {
      width: 4px;
      height: 20px;
      background: #ff00aa;
      border-radius: 2px;
      box-shadow: 0 0 8px #ff00aa;
    }

    .back-btn {
      margin-top: 40px;
      font-family: 'Permanent Marker', cursive;
      font-size: 14px;
      color: #ff00aa;
      text-decoration: none;
      border: 2px solid #ff00aa;
      padding: 10px 24px;
      border-radius: 6px;
      transition: all 0.2s;
      box-shadow: 4px 4px 0px rgba(255, 0, 170, 0.2);
    }
    .back-btn:hover {
      background: #ff00aa;
      color: #000;
      box-shadow: 0 0 15px rgba(255, 0, 170, 0.5);
    }
  </style>
</head>
<body>
  <h1>PROTOTYPE 4: BASQUIAT-WILDSTYLE HYBRID</h1>

  <div class="tuner-section">
    <!-- Basquiat Crown SVG decoration -->
    <svg class="crown-icon" viewBox="0 0 100 80">
      <path d="M10 70 L25 20 L50 45 L75 20 L90 70 Z M10 70 L90 70" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <!-- Wildstyle Arrow SVG decoration -->
    <svg class="graffiti-arrow" viewBox="0 0 100 100">
      <path d="M10 50 L70 50 L50 30 M70 50 L50 70 M80 50 L90 50" stroke="#00ffcc" stroke-linecap="round" fill="none"/>
    </svg>

    <div class="tuner-header">
      <span class="tuner-label">TUNING THE UNDERGROUND</span>
      <span class="tuner-strength" id="tuner-strength">STRENGTH: 98%</span>
    </div>

    <div class="tuner-display" id="tuner-display">
      <div class="tuner-needle" id="tuner-needle"></div>
      <div class="tuner-stations-container" id="tuner-stations-container"></div>
    </div>

    <div class="tuner-controls">
      <div class="ctrl-item">
        <span class="ctrl-key">BAND</span>
        <div class="btn-group">
          <button class="btn-tab active-green">FM</button>
          <button class="btn-tab">AM</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">MODE</span>
        <div class="btn-group">
          <button class="btn-tab active-pink">STEREO</button>
          <button class="btn-tab">MONO</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">GAIN</span>
        <div class="gain-knob" id="gain-knob">
          <div class="knob-line" id="knob-line"></div>
        </div>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-btn">← BACK TO BROADCAST DECK</a>

  <script src="stations-data.js"></script>
  <script>
    const MIN_FREQ = 88.9;
    const MAX_FREQ = 109.8;
    let currentFreq = 89.9; // Jungle
    let isDragging = false;

    function freqToPercent(freq) {
      const ratio = (freq - MIN_FREQ) / (MAX_FREQ - MIN_FREQ);
      return 5 + ratio * 90;
    }

    function percentToFreq(pct) {
      const ratio = Math.max(0, Math.min(1, (pct - 5) / 90));
      return MIN_FREQ + ratio * (MAX_FREQ - MIN_FREQ);
    }

    function setupTuner() {
      const mount = document.getElementById('tuner-stations-container');
      STATIONS.forEach(st => {
        const mark = document.createElement('div');
        mark.className = 'tuner-station-mark';
        mark.style.left = freqToPercent(st.freq) + '%';
        mark.setAttribute('data-freq', st.freq);
        mark.innerHTML = `<span class="freq-num">${st.freq.toFixed(1)}</span><span class="genre-name">${st.genre}</span>`;
        mark.addEventListener('click', () => {
          animateNeedle(st.freq);
        });
        mount.appendChild(mark);
      });
      updateTunerPosition();
    }

    function updateTunerPosition() {
      const needle = document.getElementById('tuner-needle');
      needle.style.left = freqToPercent(currentFreq) + '%';

      let nearest = null;
      let minDiff = Infinity;
      STATIONS.forEach(st => {
        const d = Math.abs(currentFreq - st.freq);
        if (d < minDiff) { minDiff = d; nearest = st; }
      });

      document.querySelectorAll('.tuner-station-mark').forEach(m => {
        const f = parseFloat(m.getAttribute('data-freq'));
        if (nearest && nearest.freq === f && minDiff < 0.25) {
          m.classList.add('active');
          document.getElementById('tuner-strength').textContent = `STRENGTH: ${Math.round((1 - minDiff / 0.25) * 20 + 80)}%`;
        } else {
          m.classList.remove('active');
        }
      });

      if (minDiff >= 0.25) {
        document.getElementById('tuner-strength').textContent = 'STRENGTH: 0% (DRIFT)';
      }
    }

    function animateNeedle(target) {
      const step = () => {
        const diff = target - currentFreq;
        if (Math.abs(diff) < 0.05) {
          currentFreq = target;
          updateTunerPosition();
        } else {
          currentFreq += diff * 0.2;
          updateTunerPosition();
          requestAnimationFrame(step);
        }
      };
      step();
    }

    const display = document.getElementById('tuner-display');
    display.addEventListener('mousedown', e => { isDragging = true; handleDrag(e.clientX); });
    window.addEventListener('mousemove', e => { if (isDragging) handleDrag(e.clientX); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    display.addEventListener('touchstart', e => { isDragging = true; handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchmove', e => { if (isDragging) handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchend', () => { isDragging = false; });

    function handleDrag(clientX) {
      const rect = display.getBoundingClientRect();
      const pct = ((clientX - rect.left) / rect.width) * 100;
      currentFreq = Math.round(percentToFreq(pct) * 10) / 10;
      updateTunerPosition();
    }

    setupTuner();
  </script>
</body>
</html>
