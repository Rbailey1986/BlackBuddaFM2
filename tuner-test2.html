<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROTOTYPE 2: WILDSTYLE GRAFFITI TUNER</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #030303;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      justify-content: center;
      background-image: radial-gradient(circle at 10% 20%, rgba(255, 0, 150, 0.05) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(0, 255, 200, 0.05) 0%, transparent 40%);
    }

    h1 {
      font-family: 'Permanent Marker', cursive;
      font-size: 32px;
      margin-bottom: 32px;
      text-transform: uppercase;
      color: #00ffcc;
      text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
      letter-spacing: 2px;
    }

    /* Wildstyle Container */
    .tuner-section {
      background: rgba(10, 10, 12, 0.95);
      border: 4px solid #00ffcc;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 800px;
      position: relative;
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.2), inset 0 0 15px rgba(255, 0, 170, 0.15);
      overflow: hidden;
    }

    /* Decorative arrow SVG in background */
    .graffiti-arrow {
      position: absolute;
      bottom: -10px;
      right: -10px;
      width: 120px;
      height: 120px;
      opacity: 0.15;
      fill: #ff00aa;
    }

    .tuner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(0, 255, 204, 0.2);
      padding-bottom: 12px;
    }

    .tuner-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #ff00aa;
      text-shadow: 0 0 10px rgba(255, 0, 170, 0.5);
      letter-spacing: 3px;
    }

    .tuner-strength {
      font-size: 12px;
      color: #00ffcc;
      text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
    }

    /* Display - glowing bar style */
    .tuner-display {
      position: relative;
      width: 100%;
      height: 120px;
      background: #000;
      border-radius: 8px;
      border: 2px solid rgba(255, 0, 170, 0.4);
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      overflow: hidden;
      cursor: ew-resize;
      user-select: none;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
    }

    .tuner-needle {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #00ffcc;
      box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    .tuner-stations-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tuner-station-mark {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #444;
      font-family: 'Bebas Neue', sans-serif;
      transition: all 0.2s ease-out;
      cursor: pointer;
      pointer-events: auto;
    }

    .tuner-station-mark .freq-num {
      font-size: 32px;
      line-height: 0.9;
    }

    .tuner-station-mark .genre-name {
      font-size: 10px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      color: #666;
      letter-spacing: 1px;
    }

    .tuner-station-mark.active {
      color: #ff00aa;
      transform: translate(-50%, -50%) scale(1.3);
      text-shadow: 0 0 15px rgba(255, 0, 170, 0.8);
      z-index: 2;
    }

    .tuner-station-mark.active .genre-name {
      color: #00ffcc;
      text-shadow: 0 0 8px rgba(0, 255, 204, 0.8);
    }

    /* Controls */
    .tuner-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ctrl-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctrl-key {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: #ff00aa;
      letter-spacing: 1px;
    }

    .btn-group {
      display: flex;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid #00ffcc;
      border-radius: 20px;
      padding: 2px;
    }

    .btn-tab {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      padding: 6px 20px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      border-radius: 18px;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .btn-tab.active-green, .btn-tab.active-pink {
      background: linear-gradient(135deg, #ff00aa, #00ffcc);
      color: #000;
      box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
      font-weight: 700;
    }

    .gain-knob {
      width: 50px;
      height: 50px;
      background: #111;
      border: 3px solid #ff00aa;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ns-resize;
      box-shadow: 0 0 12px rgba(255, 0, 170, 0.4);
    }

    .knob-line {
      width: 4px;
      height: 20px;
      background: #00ffcc;
      border-radius: 2px;
      box-shadow: 0 0 8px #00ffcc;
    }

    .back-btn {
      margin-top: 40px;
      font-family: 'Permanent Marker', cursive;
      font-size: 14px;
      color: #00ffcc;
      text-decoration: none;
      border: 2px solid #00ffcc;
      padding: 10px 24px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #00ffcc;
      color: #000;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
    }
  </style>
</head>
<body>
  <h1>PROTOTYPE 2: WILDSTYLE MURAL</h1>

  <div class="tuner-section">
    <!-- Graffiti Arrow SVG Background -->
    <svg class="graffiti-arrow" viewBox="0 0 100 100">
      <path d="M10 50 L70 50 L50 30 M70 50 L50 70 M80 50 L90 50" stroke="#ff00aa" stroke-width="8" stroke-linecap="round" fill="none"/>
    </svg>

    <div class="tuner-header">
      <span class="tuner-label">TUNING THE UNDERGROUND</span>
      <span class="tuner-strength" id="tuner-strength">STRENGTH: 98%</span>
    </div>

    <div class="tuner-display" id="tuner-display">
      <div class="tuner-needle" id="tuner-needle"></div>
      <div class="tuner-stations-container" id="tuner-stations-container"></div>
    </div>

    <div class="tuner-controls">
      <div class="ctrl-item">
        <span class="ctrl-key">BAND</span>
        <div class="btn-group">
          <button class="btn-tab active-green">FM</button>
          <button class="btn-tab">AM</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">MODE</span>
        <div class="btn-group">
          <button class="btn-tab active-pink">STEREO</button>
          <button class="btn-tab">MONO</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">GAIN</span>
        <div class="gain-knob" id="gain-knob">
          <div class="knob-line" id="knob-line"></div>
        </div>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-btn">← BACK TO BROADCAST DECK</a>

  <script src="stations-data.js"></script>
  <script>
    const MIN_FREQ = 88.9;
    const MAX_FREQ = 109.8;
    let currentFreq = 89.9; // Jungle
    let isDragging = false;

    function freqToPercent(freq) {
      const ratio = (freq - MIN_FREQ) / (MAX_FREQ - MIN_FREQ);
      return 5 + ratio * 90;
    }

    function percentToFreq(pct) {
      const ratio = Math.max(0, Math.min(1, (pct - 5) / 90));
      return MIN_FREQ + ratio * (MAX_FREQ - MIN_FREQ);
    }

    function setupTuner() {
      const mount = document.getElementById('tuner-stations-container');
      STATIONS.forEach(st => {
        const mark = document.createElement('div');
        mark.className = 'tuner-station-mark';
        mark.style.left = freqToPercent(st.freq) + '%';
        mark.setAttribute('data-freq', st.freq);
        mark.innerHTML = `<span class="freq-num">${st.freq.toFixed(1)}</span><span class="genre-name">${st.genre}</span>`;
        mark.addEventListener('click', () => {
          animateNeedle(st.freq);
        });
        mount.appendChild(mark);
      });
      updateTunerPosition();
    }

    function updateTunerPosition() {
      const needle = document.getElementById('tuner-needle');
      needle.style.left = freqToPercent(currentFreq) + '%';

      let nearest = null;
      let minDiff = Infinity;
      STATIONS.forEach(st => {
        const d = Math.abs(currentFreq - st.freq);
        if (d < minDiff) { minDiff = d; nearest = st; }
      });

      document.querySelectorAll('.tuner-station-mark').forEach(m => {
        const f = parseFloat(m.getAttribute('data-freq'));
        if (nearest && nearest.freq === f && minDiff < 0.25) {
          m.classList.add('active');
          document.getElementById('tuner-strength').textContent = `STRENGTH: ${Math.round((1 - minDiff / 0.25) * 20 + 80)}%`;
        } else {
          m.classList.remove('active');
        }
      });

      if (minDiff >= 0.25) {
        document.getElementById('tuner-strength').textContent = 'STRENGTH: 0% (DRIFT)';
      }
    }

    function animateNeedle(target) {
      const step = () => {
        const diff = target - currentFreq;
        if (Math.abs(diff) < 0.05) {
          currentFreq = target;
          updateTunerPosition();
        } else {
          currentFreq += diff * 0.2;
          updateTunerPosition();
          requestAnimationFrame(step);
        }
      };
      step();
    }

    const display = document.getElementById('tuner-display');
    display.addEventListener('mousedown', e => { isDragging = true; handleDrag(e.clientX); });
    window.addEventListener('mousemove', e => { if (isDragging) handleDrag(e.clientX); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    display.addEventListener('touchstart', e => { isDragging = true; handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchmove', e => { if (isDragging) handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchend', () => { isDragging = false; });

    function handleDrag(clientX) {
      const rect = display.getBoundingClientRect();
      const pct = ((clientX - rect.left) / rect.width) * 100;
      currentFreq = Math.round(percentToFreq(pct) * 10) / 10;
      updateTunerPosition();
    }

    setupTuner();
  </script>
</body>
</html>
