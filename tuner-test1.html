<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROTOTYPE 1: RAW BASQUIAT TUNER</title>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Rock+Salt&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      color: #f0f0f5;
      font-family: 'JetBrains Mono', monospace;
      padding: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      justify-content: center;
    }

    h1 {
      font-family: 'Rock Salt', cursive;
      font-size: 24px;
      margin-bottom: 32px;
      text-transform: uppercase;
      color: #ff00ff;
      text-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
    }

    /* Basquiat Container */
    .tuner-section {
      background: #08090d;
      border: 3px dashed #ff00ff;
      padding: 40px;
      width: 100%;
      max-width: 800px;
      position: relative;
      box-shadow: 12px 12px 0px rgba(255, 0, 255, 0.2);
    }

    /* Hand drawn crown decoration */
    .crown-icon {
      position: absolute;
      top: -25px;
      right: 20px;
      width: 60px;
      height: 45px;
      fill: none;
      stroke: #ffd700;
      stroke-width: 3;
      filter: drop-shadow(0 0 8px #ffd700);
      transform: rotate(15deg);
    }

    .tuner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      border-bottom: 2px solid #333;
      padding-bottom: 12px;
    }

    .tuner-label {
      font-family: 'Permanent Marker', cursive;
      font-size: 18px;
      color: #ffd700;
      letter-spacing: 2px;
    }

    .tuner-strength {
      font-size: 11px;
      color: #888;
    }

    /* Display */
    .tuner-display {
      position: relative;
      width: 100%;
      height: 140px;
      background: #020203;
      border: 3px solid #ff00ff;
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      overflow: hidden;
      cursor: ew-resize;
      user-select: none;
    }

    /* Scratched look */
    .tuner-display::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(255, 255, 255, 0.03) 4px, rgba(255, 255, 255, 0.03) 8px);
      pointer-events: none;
    }

    .tuner-needle {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 6px;
      background: #ff0055;
      box-shadow: 0 0 15px #ff0055;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
    }

    /* Needle chalk cap */
    .tuner-needle::before {
      content: '▲';
      color: #ff0055;
      font-size: 14px;
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
    }

    .tuner-stations-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .tuner-station-mark {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #555;
      font-family: 'Permanent Marker', cursive;
      transition: all 0.2s;
      cursor: pointer;
      pointer-events: auto;
    }

    .tuner-station-mark .freq-num {
      font-size: 20px;
      letter-spacing: -1px;
    }

    .tuner-station-mark .genre-name {
      font-size: 9px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      color: #ffd700;
      text-decoration: line-through;
      text-decoration-color: #ff00ff;
    }

    .tuner-station-mark.active {
      color: #ffd700;
      transform: translate(-50%, -50%) scale(1.25) rotate(-3deg);
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
    }

    .tuner-station-mark.active .genre-name {
      text-decoration: none;
      color: #ff00ff;
    }

    /* Controls */
    .tuner-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ctrl-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ctrl-key {
      font-family: 'Permanent Marker', cursive;
      font-size: 14px;
      color: #ffd700;
    }

    .btn-group {
      display: flex;
      background: #000;
      border: 2px dashed #ff00ff;
      padding: 4px;
      transform: rotate(-1.5deg);
    }

    .btn-tab {
      font-family: 'Permanent Marker', cursive;
      font-size: 12px;
      padding: 6px 16px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-tab.active-pink {
      background: #ff00ff;
      color: #000;
      transform: scale(1.1) rotate(2deg);
    }

    .btn-tab.active-green {
      background: #ffd700;
      color: #000;
      transform: scale(1.1) rotate(-2deg);
    }

    .gain-knob {
      width: 48px;
      height: 48px;
      background: #050505;
      border: 3px double #ff00ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: ns-resize;
    }

    .knob-line {
      width: 4px;
      height: 20px;
      background: #ffd700;
      border-radius: 2px;
    }

    .back-btn {
      margin-top: 40px;
      font-family: 'Permanent Marker', cursive;
      font-size: 14px;
      color: #ff00ff;
      text-decoration: none;
      border: 2px solid #ff00ff;
      padding: 10px 24px;
      transition: all 0.2s;
    }
    .back-btn:hover {
      background: #ff00ff;
      color: #000;
    }
  </style>
</head>
<body>
  <h1>PROTOTYPE 1: BASQUIAT OIL PASTEL</h1>

  <div class="tuner-section">
    <!-- Basquiat Crown SVG -->
    <svg class="crown-icon" viewBox="0 0 100 80">
      <path d="M10 70 L25 20 L50 45 L75 20 L90 70 Z M10 70 L90 70" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="tuner-header">
      <span class="tuner-label">TUNING THE UNDERGROUND</span>
      <span class="tuner-strength" id="tuner-strength">STRENGTH: 98%</span>
    </div>

    <div class="tuner-display" id="tuner-display">
      <div class="tuner-needle" id="tuner-needle"></div>
      <div class="tuner-stations-container" id="tuner-stations-container"></div>
    </div>

    <div class="tuner-controls">
      <div class="ctrl-item">
        <span class="ctrl-key">BAND</span>
        <div class="btn-group">
          <button class="btn-tab active-green">FM</button>
          <button class="btn-tab">AM</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">MODE</span>
        <div class="btn-group">
          <button class="btn-tab active-pink">STEREO</button>
          <button class="btn-tab">MONO</button>
        </div>
      </div>
      <div class="ctrl-item">
        <span class="ctrl-key">GAIN</span>
        <div class="gain-knob" id="gain-knob">
          <div class="knob-line" id="knob-line"></div>
        </div>
      </div>
    </div>
  </div>

  <a href="index.html" class="back-btn">← BACK TO BROADCAST DECK</a>

  <script src="stations-data.js"></script>
  <script>
    const MIN_FREQ = 88.9;
    const MAX_FREQ = 109.8;
    let currentFreq = 89.9; // Jungle
    let isDragging = false;

    function freqToPercent(freq) {
      const ratio = (freq - MIN_FREQ) / (MAX_FREQ - MIN_FREQ);
      return 5 + ratio * 90;
    }

    function percentToFreq(pct) {
      const ratio = Math.max(0, Math.min(1, (pct - 5) / 90));
      return MIN_FREQ + ratio * (MAX_FREQ - MIN_FREQ);
    }

    function setupTuner() {
      const mount = document.getElementById('tuner-stations-container');
      STATIONS.forEach(st => {
        const mark = document.createElement('div');
        mark.className = 'tuner-station-mark';
        mark.style.left = freqToPercent(st.freq) + '%';
        mark.setAttribute('data-freq', st.freq);
        mark.innerHTML = `<span class="freq-num">${st.freq.toFixed(1)}</span><span class="genre-name">${st.genre}</span>`;
        mark.addEventListener('click', () => {
          animateNeedle(st.freq);
        });
        mount.appendChild(mark);
      });
      updateTunerPosition();
    }

    function updateTunerPosition() {
      const needle = document.getElementById('tuner-needle');
      needle.style.left = freqToPercent(currentFreq) + '%';

      let nearest = null;
      let minDiff = Infinity;
      STATIONS.forEach(st => {
        const d = Math.abs(currentFreq - st.freq);
        if (d < minDiff) { minDiff = d; nearest = st; }
      });

      document.querySelectorAll('.tuner-station-mark').forEach(m => {
        const f = parseFloat(m.getAttribute('data-freq'));
        if (nearest && nearest.freq === f && minDiff < 0.25) {
          m.classList.add('active');
          document.getElementById('tuner-strength').textContent = `STRENGTH: ${Math.round((1 - minDiff / 0.25) * 20 + 80)}%`;
        } else {
          m.classList.remove('active');
        }
      });

      if (minDiff >= 0.25) {
        document.getElementById('tuner-strength').textContent = 'STRENGTH: 0% (DRIFT)';
      }
    }

    function animateNeedle(target) {
      const step = () => {
        const diff = target - currentFreq;
        if (Math.abs(diff) < 0.05) {
          currentFreq = target;
          updateTunerPosition();
        } else {
          currentFreq += diff * 0.2;
          updateTunerPosition();
          requestAnimationFrame(step);
        }
      };
      step();
    }

    const display = document.getElementById('tuner-display');
    display.addEventListener('mousedown', e => { isDragging = true; handleDrag(e.clientX); });
    window.addEventListener('mousemove', e => { if (isDragging) handleDrag(e.clientX); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    display.addEventListener('touchstart', e => { isDragging = true; handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchmove', e => { if (isDragging) handleDrag(e.touches[0].clientX); }, {passive: true});
    window.addEventListener('touchend', () => { isDragging = false; });

    function handleDrag(clientX) {
      const rect = display.getBoundingClientRect();
      const pct = ((clientX - rect.left) / rect.width) * 100;
      currentFreq = Math.round(percentToFreq(pct) * 10) / 10;
      updateTunerPosition();
    }

    setupTuner();
  </script>
</body>
</html>
